name: PlayFlix
options:
  deploymentTarget:
    iOS: "17.0"
    tvOS: "17.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_NAME: PlayFlix
    SWIFT_VERSION: 5.10
    DEVELOPMENT_TEAM: ""
packages: {}
targets:
  PlayFlix:
    type: application
    platform: iOS
    sources:
      - path: PlayFlix
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.playflix.app
        INFOPLIST_FILE: PlayFlix/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: PlayFlix/Resources/PlayFlix.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    dependencies:
      - target: PlayFlixWidget
      - target: PlayFlixLiveActivity
  PlayFlixWidget:
    type: app-extension
    platform: iOS
    product: widget-extension
    sources:
      - path: PlayFlixWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.playflix.app.widget
        INFOPLIST_FILE: PlayFlixWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: PlayFlix/Resources/PlayFlix.entitlements
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
  PlayFlixLiveActivity:
    type: app-extension
    platform: iOS
    product: widget-extension
    sources:
      - path: PlayFlixLiveActivity
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.playflix.app.liveactivity
        INFOPLIST_FILE: PlayFlixLiveActivity/Info.plist
        CODE_SIGN_ENTITLEMENTS: PlayFlix/Resources/PlayFlix.entitlements
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
  PlayFlixTV:
    type: application
    platform: tvOS
    sources:
      - path: PlayFlix
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.playflix.app.tv
        INFOPLIST_FILE: PlayFlix/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: PlayFlix/Resources/PlayFlix.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TVOS_DEPLOYMENT_TARGET: "17.0"
